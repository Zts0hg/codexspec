# AI intelligent judgment rules
rules:
  - pattern: "^[A-Z]{2,}$"
    description: "All-caps abbreviations should be kept in English"
    action: keep

  - pattern: "^/[a-z-]+"
    description: "Slash commands should be kept as-is"
    action: keep

  - pattern: "^[a-z]+\\.[a-z]+$"
    description: "File extensions should be kept in English"
    action: keep

  - pattern: "\\b\\d+\\.\\d+\\.\\d+\\b"
    description: "Version numbers should be kept as-is"
    action: keep

  - pattern: "```[\\s\\S]*?```"
    description: "Code blocks should not be translated"
    action: keep

  - pattern: "`[^`]+`"
    description: "Inline code should not be translated"
    action: keep
