site_name: CodexSpec
site_description: A Spec-Driven Development (SDD) toolkit for Claude Code
site_url: https://zts0hg.github.io/codexspec/
repo_url: https://github.com/Zts0hg/codexspec
repo_name: Zts0hg/codexspec
edit_uri: edit/main/docs/

# Documentation directory (parent folder containing all language subdirectories)
docs_dir: docs

# Exclude internal planning documents and i18n config from build
exclude_docs: |
  /plans/
  /i18n/

theme:
  name: material
  favicon: assets/images/favicon.svg
  logo: assets/images/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - User Guide:
    - Workflow: user-guide/workflow.md
    - Commands: user-guide/commands.md
    - Internationalization: user-guide/i18n.md
  - Case Studies:
    - PR Description Generator: case-studies/case-study-pr-description-generator.md
  - Reference:
    - CLI: reference/cli.md
    - Configuration: reference/configuration.md
  - Development:
    - Contributing: development/contributing.md
    - Scripts Architecture: development/scripts-architecture.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
  - i18n:
      docs_structure: folder
      reconfigure_search: false
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文简体
          build: true
        - locale: ja
          name: 日本語
          build: true
        - locale: ko
          name: 한국어
          build: true
        - locale: es
          name: Español
          build: true
        - locale: fr
          name: Français
          build: true
        - locale: de
          name: Deutsch
          build: true
        - locale: pt-BR
          name: Português (Brasil)
          build: true

hooks:
  - hooks/post_build.py

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Zts0hg/codexspec
  alternate:
    - name: English
      link: /codexspec/
      lang: en
    - name: 中文简体
      link: /codexspec/zh/
      lang: zh
    - name: 日本語
      link: /codexspec/ja/
      lang: ja
    - name: 한국어
      link: /codexspec/ko/
      lang: ko
    - name: Español
      link: /codexspec/es/
      lang: es
    - name: Français
      link: /codexspec/fr/
      lang: fr
    - name: Deutsch
      link: /codexspec/de/
      lang: de
    - name: Português (Brasil)
      link: /codexspec/pt-BR/
      lang: pt-BR

extra_css:
  - assets/stylesheets/extra.css
