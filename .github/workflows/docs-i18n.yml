# GitHub Actions workflow: deterministic i18n build gate for documentation.
#
# Runs `mkdocs build --strict` on every docs change (push to main + pull requests)
# to catch build errors, broken links, and malformed content across all language
# versions.
#
# NOTE: This workflow NO LONGER auto-translates. Translations are produced and
# committed manually via /codexspec:translate-docs (English source + all
# translations in one atomic, reviewed commit). The earlier AI auto-translation
# was removed because it never actually ran (a malformed `if` skipped the
# translate job on every push), required a standing ANTHROPIC_API_KEY secret, and
# would have committed unreviewed translations directly to main. Do not re-add
# auto-translation without revisiting that trade-off.
#
# The previous structure/completeness shell checks
# (scripts/bash/check-i18n-*.sh) are intentionally omitted: both scripts are
# currently non-functional (multiple path/detection bugs and have never produced
# a valid result), so running them would fail every CI run. Rewrite them properly
# as a separate task before re-adding them here.

name: Docs i18n Checks

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build verification: ensure every language version builds cleanly under
  # --strict (fails on build errors, broken links, missing refs, etc.).
  verify-build:
      runs-on: ubuntu-latest
      steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Setup Python
            uses: actions/setup-python@v5
            with:
                python-version: '3.11'

          - name: Install uv
            run: curl -LsSf https://astral.sh/uv/install.sh | sh

          - name: Install dependencies
            run: uv sync --extra docs

          - name: Build all language versions
            run: uv run mkdocs build --strict

          - name: Upload build artifacts
            uses: actions/upload-artifact@v4
            with:
                name: site-build
                path: site/
                retention-days: 7
