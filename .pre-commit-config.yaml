# Pre-commit configuration for CodexSpec
# Install: uv run pre-commit install
# Run manually: uv run pre-commit run --all-files

repos:
  # ========================================
  # Python Code Quality
  # ========================================

  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # mypy - Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [src/, --ignore-missing-imports, --python-version=3.11, --no-strict-optional]
        additional_dependencies: [types-PyYAML]
        files: ^src/
        pass_filenames: false

  # bandit - Security linting
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        files: ^src/

  # ========================================
  # General File Checks
  # ========================================

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: debug-statements
      - id: requirements-txt-fixer
        files: requirements.*\.txt$

  # ========================================
  # Documentation
  # ========================================

  # markdownlint-cli - Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: [--fix]

  # ========================================
  # Shell Scripts
  # ========================================

  # shellcheck - Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # ========================================
  # Dependency Security
  # ========================================

  # pip-audit - Dependency security check (local hook)
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: uvx pip-audit
        language: system
        pass_filenames: false

  # ========================================
  # Local Hooks
  # ========================================

  # pytest - Testing (local hook)
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run --extra dev pytest -x --tb=short
        language: system
        pass_filenames: false
        files: \.py$
        stages: [pre-commit]

  # commitizen - Commit message linting
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.30.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

# CI configuration
ci:
  autofix_prs: true
  autofix_commit_msg: "style: auto-fix pre-commit issues"
  autoupdate_branch: main
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
  autoupdate_schedule: weekly
